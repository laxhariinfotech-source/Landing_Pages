<!doctype html>

    <!-- Modern favicon setup for crystal-clear display -->

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />

    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt"   content="BlinkChart – AI-powered chart generation from spreadsheets" />
